<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kebrchacha Bingo - Simple Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #121212, #1a1a1a);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
            padding: 40px 20px;
        }
        .logo {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(45deg, #39FF14, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .status {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid #39FF14;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .button {
            background: linear-gradient(45deg, #39FF14, #32CD32);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(57, 255, 20, 0.3);
        }
        .info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
        }
        .success { color: #39FF14; }
        .error { color: #FF4444; }
        .warning { color: #FFA500; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮 Kebrchacha Bingo</div>
        
        <div class="status">
            <h3>✅ Simple Test Version Working!</h3>
            <p>This confirms the server and basic HTML are working correctly.</p>
        </div>

        <div class="info">
            <h4>🔍 Environment Check:</h4>
            <p><strong>URL:</strong> <span id="currentUrl"></span></p>
            <p><strong>Telegram WebApp:</strong> <span id="telegramStatus"></span></p>
            <p><strong>Time:</strong> <span id="currentTime"></span></p>
        </div>

        <div class="info">
            <h4>🧪 Asset Tests:</h4>
            <p><strong>CSS File:</strong> <span id="cssTest">Testing...</span></p>
            <p><strong>JS File:</strong> <span id="jsTest">Testing...</span></p>
            <p><strong>Backend:</strong> <span id="backendTest">Testing...</span></p>
        </div>

        <button class="button" onclick="testFullApp()">🚀 Test Full App</button>
        <button class="button" onclick="runDiagnostics()">🔧 Run Diagnostics</button>
        
        <div id="results"></div>
    </div>

    <script>
        // Basic info
        document.getElementById('currentUrl').textContent = window.location.href;
        document.getElementById('currentTime').textContent = new Date().toLocaleString();

        // Telegram check
        if (window.Telegram?.WebApp) {
            document.getElementById('telegramStatus').innerHTML = '<span class="success">Available ✓</span>';
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        } else {
            document.getElementById('telegramStatus').innerHTML = '<span class="warning">Not Available (Web Mode)</span>';
        }

        // Test assets
        async function testAssets() {
            // Test CSS
            try {
                const cssResponse = await fetch('/kbingo/assets/index-BmR_6EwN.css', { method: 'HEAD' });
                document.getElementById('cssTest').innerHTML = cssResponse.ok ? 
                    '<span class="success">Found ✓</span>' : 
                    `<span class="error">Error ${cssResponse.status} ✗</span>`;
            } catch (error) {
                document.getElementById('cssTest').innerHTML = '<span class="error">Failed ✗</span>';
            }

            // Test JS
            try {
                const jsResponse = await fetch('/kbingo/assets/index-DH6_iV7_.js', { method: 'HEAD' });
                document.getElementById('jsTest').innerHTML = jsResponse.ok ? 
                    '<span class="success">Found ✓</span>' : 
                    `<span class="error">Error ${jsResponse.status} ✗</span>`;
            } catch (error) {
                document.getElementById('jsTest').innerHTML = '<span class="error">Failed ✗</span>';
            }

            // Test Backend
            try {
                const backendResponse = await fetch('https://bingo-mini-app-sily.onrender.com/health');
                if (backendResponse.ok) {
                    document.getElementById('backendTest').innerHTML = '<span class="success">Online ✓</span>';
                } else {
                    document.getElementById('backendTest').innerHTML = '<span class="error">Offline ✗</span>';
                }
            } catch (error) {
                document.getElementById('backendTest').innerHTML = '<span class="error">Failed ✗</span>';
            }
        }

        function testFullApp() {
            window.location.href = './index.html';
        }

        function runDiagnostics() {
            window.location.href = './debug.html';
        }

        // Auto-run tests
        window.addEventListener('load', testAssets);
    </script>
</body>
</html>
