<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kebrchacha Bingo - Performance Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #121212, #1a1a1a);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #D4AF37, #ff6b35);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: black;
            margin: 0 auto 20px;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .test-card {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .test-result {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            color: #39FF14;
        }
        .test-label {
            font-size: 14px;
            opacity: 0.8;
        }
        .status {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            margin: 10px 0;
            display: inline-block;
        }
        .status.good { background: rgba(57, 255, 20, 0.2); color: #39FF14; }
        .status.warning { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
        .status.error { background: rgba(244, 67, 54, 0.2); color: #F44336; }
        .btn {
            background: linear-gradient(135deg, #39FF14, #2196F3);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .details {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">K</div>
            <h1>Kebrchacha Bingo Performance Test</h1>
            <p>Testing your Vite build performance and connectivity</p>
        </div>

        <div class="test-grid">
            <div class="test-card">
                <div class="test-label">Page Load Time</div>
                <div class="test-result" id="loadTime">Testing...</div>
                <div class="status" id="loadStatus">Measuring</div>
            </div>

            <div class="test-card">
                <div class="test-label">API Connectivity</div>
                <div class="test-result" id="apiTime">Testing...</div>
                <div class="status" id="apiStatus">Checking</div>
            </div>

            <div class="test-card">
                <div class="test-label">Bundle Size</div>
                <div class="test-result">~378KB</div>
                <div class="status good">Optimized</div>
            </div>

            <div class="test-card">
                <div class="test-label">Compression</div>
                <div class="test-result" id="compression">Testing...</div>
                <div class="status" id="compressionStatus">Checking</div>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="btn" onclick="runTests()">🔄 Run Tests Again</button>
            <button class="btn" onclick="window.location.href='/'">🎮 Launch Kebrchacha Bingo</button>
        </div>

        <div class="details" id="details">
            <strong>🔍 Test Details:</strong><br>
            <span id="detailsContent">Click "Run Tests Again" to see detailed results...</span>
        </div>
    </div>

    <script>
        const API_URL = 'https://bingo-mini-app-sily.onrender.com';
        
        function updateLoadTime() {
            const loadTime = performance.now();
            document.getElementById('loadTime').textContent = Math.round(loadTime) + 'ms';
            
            const loadStatus = document.getElementById('loadStatus');
            if (loadTime < 2000) {
                loadStatus.textContent = 'Excellent';
                loadStatus.className = 'status good';
            } else if (loadTime < 4000) {
                loadStatus.textContent = 'Good';
                loadStatus.className = 'status warning';
            } else {
                loadStatus.textContent = 'Slow';
                loadStatus.className = 'status error';
            }
        }

        async function testAPI() {
            const apiTimeEl = document.getElementById('apiTime');
            const apiStatusEl = document.getElementById('apiStatus');
            
            try {
                const startTime = performance.now();
                const response = await fetch(`${API_URL}/api/game/stats`);
                const endTime = performance.now();
                const responseTime = Math.round(endTime - startTime);
                
                apiTimeEl.textContent = responseTime + 'ms';
                
                if (response.ok) {
                    if (responseTime < 500) {
                        apiStatusEl.textContent = 'Excellent';
                        apiStatusEl.className = 'status good';
                    } else if (responseTime < 1000) {
                        apiStatusEl.textContent = 'Good';
                        apiStatusEl.className = 'status warning';
                    } else {
                        apiStatusEl.textContent = 'Slow';
                        apiStatusEl.className = 'status warning';
                    }
                } else {
                    apiStatusEl.textContent = 'Error';
                    apiStatusEl.className = 'status error';
                }
            } catch (error) {
                apiTimeEl.textContent = 'Failed';
                apiStatusEl.textContent = 'Offline';
                apiStatusEl.className = 'status error';
            }
        }

        function testCompression() {
            const compressionEl = document.getElementById('compression');
            const compressionStatusEl = document.getElementById('compressionStatus');
            
            fetch(window.location.href, { method: 'HEAD' })
                .then(response => {
                    const encoding = response.headers.get('content-encoding');
                    if (encoding && (encoding.includes('gzip') || encoding.includes('deflate'))) {
                        compressionEl.textContent = 'Enabled';
                        compressionStatusEl.textContent = 'Active';
                        compressionStatusEl.className = 'status good';
                    } else {
                        compressionEl.textContent = 'Disabled';
                        compressionStatusEl.textContent = 'Missing';
                        compressionStatusEl.className = 'status warning';
                    }
                })
                .catch(() => {
                    compressionEl.textContent = 'Unknown';
                    compressionStatusEl.textContent = 'Error';
                    compressionStatusEl.className = 'status error';
                });
        }

        function updateDetails() {
            const details = [
                `🌐 User Agent: ${navigator.userAgent}`,
                `📱 Screen: ${screen.width}x${screen.height}`,
                `🔗 Connection: ${navigator.connection ? navigator.connection.effectiveType : 'Unknown'}`,
                `⚡ Memory: ${navigator.deviceMemory ? navigator.deviceMemory + 'GB' : 'Unknown'}`,
                `🕒 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`,
                `🌍 Language: ${navigator.language}`,
                `📍 Location: ${window.location.href}`,
                `🔧 Protocol: ${window.location.protocol}`,
                `⏰ Test Time: ${new Date().toLocaleString()}`,
                `🎯 API Endpoint: ${API_URL}`,
                `📦 Build: Vite + React 19 + Tailwind CSS`,
                `🚀 Deployment: cPanel Static + Render API`,
                `📊 Bundle Size: ~378KB (83% reduction from CRA)`
            ];
            
            document.getElementById('detailsContent').innerHTML = details.join('<br>');
        }

        function runTests() {
            document.getElementById('apiTime').textContent = 'Testing...';
            document.getElementById('apiStatus').textContent = 'Checking';
            document.getElementById('apiStatus').className = 'status';
            
            document.getElementById('compression').textContent = 'Testing...';
            document.getElementById('compressionStatus').textContent = 'Checking';
            document.getElementById('compressionStatus').className = 'status';
            
            testAPI();
            testCompression();
            updateDetails();
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                updateLoadTime();
                runTests();
            }, 100);
        });

        setInterval(runTests, 30000);
    </script>
</body>
</html>
