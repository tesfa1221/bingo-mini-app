<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Kebrchacha Bingo...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a, #121212, #1a1a1a);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 350px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(57, 255, 20, 0.2);
        }
        .logo {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #39FF14, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(57, 255, 20, 0.3);
            border-top: 4px solid #39FF14;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .button {
            background: linear-gradient(45deg, #39FF14, #32CD32);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin: 15px 5px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(57, 255, 20, 0.3);
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(57, 255, 20, 0.4);
        }
        .status {
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        .info {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.3);
            color: #39FF14;
        }
        .warning {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid rgba(255, 165, 0, 0.3);
            color: #FFA500;
        }
        .success {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.3);
            color: #39FF14;
        }
        .small {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮 Kebrchacha Bingo</div>
        
        <div class="spinner" id="spinner"></div>
        
        <div class="status info" id="status">
            🚀 Opening game in browser for best experience...
        </div>
        
        <div id="buttons" style="display: none;">
            <a href="https://negattech.com/kbingo/app/" class="button" id="manualLink" target="_blank">
                🌐 Open Game
            </a>
            <br>
            <a href="https://negattech.com/kbingo/app/" class="button" id="directLink" target="_blank" style="background: linear-gradient(45deg, #D4AF37, #FFD700);">
                🎯 Direct Link
            </a>
        </div>
        
        <div class="small">
            <p>🔧 Bypassing Telegram cache for optimal performance</p>
            <p id="telegramStatus"></p>
        </div>
    </div>

    <script>
        console.log('🚀 Kebrchacha Redirect Page Loaded');
        
        const statusDiv = document.getElementById('status');
        const spinner = document.getElementById('spinner');
        const buttons = document.getElementById('buttons');
        const telegramStatus = document.getElementById('telegramStatus');
        
        // Check if running in Telegram
        const isInTelegram = window.Telegram?.WebApp;
        
        if (isInTelegram) {
            console.log('📱 Running in Telegram WebApp');
            telegramStatus.textContent = '📱 Detected: Telegram WebApp';
            
            // Initialize Telegram WebApp
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            // Method 1: Immediate redirect attempt
            setTimeout(() => {
                console.log('🔄 Attempting external browser redirect...');
                statusDiv.innerHTML = '🔄 Redirecting to external browser...';
                statusDiv.className = 'status warning';
                
                try {
                    tg.openLink('https://negattech.com/kbingo/app/');
                    
                    // Show success message
                    setTimeout(() => {
                        statusDiv.innerHTML = '✅ Redirected! If game didn\'t open, use buttons below:';
                        statusDiv.className = 'status success';
                        spinner.style.display = 'none';
                        buttons.style.display = 'block';
                    }, 2000);
                    
                } catch (error) {
                    console.error('❌ Redirect failed:', error);
                    showManualOptions();
                }
            }, 1500);
            
            // Method 2: Fallback after 5 seconds
            setTimeout(() => {
                showManualOptions();
            }, 5000);
            
        } else {
            console.log('🌐 Running in regular browser');
            telegramStatus.textContent = '🌐 Detected: Regular Browser';
            
            // Direct redirect if not in Telegram
            statusDiv.innerHTML = '🔄 Redirecting to game...';
            statusDiv.className = 'status info';
            
            setTimeout(() => {
                window.location.href = 'https://negattech.com/kbingo/app/';
            }, 1000);
        }
        
        function showManualOptions() {
            statusDiv.innerHTML = '🎯 Tap a button below to open the game:';
            statusDiv.className = 'status info';
            spinner.style.display = 'none';
            buttons.style.display = 'block';
        }
        
        // Manual button handlers
        document.getElementById('manualLink').addEventListener('click', (e) => {
            if (isInTelegram) {
                e.preventDefault();
                console.log('🔗 Manual link clicked - forcing external browser');
                window.Telegram.WebApp.openLink('https://negattech.com/kbingo/app/');
            }
        });
        
        document.getElementById('directLink').addEventListener('click', (e) => {
            if (isInTelegram) {
                e.preventDefault();
                console.log('🎯 Direct link clicked - forcing external browser');
                window.Telegram.WebApp.openLink('https://negattech.com/kbingo/app/');
            }
        });
        
        // Analytics
        console.log('📊 Redirect page analytics:', {
            userAgent: navigator.userAgent,
            isInTelegram: isInTelegram,
            timestamp: new Date().toISOString(),
            targetUrl: 'https://negattech.com/kbingo/app/'
        });
    </script>
</body>
</html>
